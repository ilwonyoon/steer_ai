<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Steer Prototype</title>
    <style>
      :root {
        color-scheme: light dark;
        --canvas: #f7f7f8;
        --surface: #ffffff;
        --surface-2: #f1f1f3;
        --text: #111111;
        --muted: #6b6b70;
        --tertiary: #9b9ba1;
        --line: #e5e5e7;
        --blue: #0a84ff;
        --green: #34c759;
        --amber: #ffb020;
        --red: #ff453a;
        --glass: rgba(255, 255, 255, 0.72);
        --glass-strong: rgba(255, 255, 255, 0.86);
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.12);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --canvas: #000000;
          --surface: #1c1c1f;
          --surface-2: #1f1f23;
          --text: #f5f5f7;
          --muted: #a1a1a8;
          --tertiary: #6f6f76;
          --line: #2a2a2d;
          --glass: rgba(28, 28, 31, 0.66);
          --glass-strong: rgba(28, 28, 31, 0.82);
          --shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--canvas);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, "Segoe UI", sans-serif;
        letter-spacing: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .shell {
        width: 375px;
        height: 812px;
        max-width: 100vw;
        max-height: 100vh;
        margin: 0 auto;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: 14px;
        gap: 12px;
        overflow: hidden;
      }

      .topbar {
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand strong {
        font-size: 17px;
        line-height: 1.2;
        font-weight: 650;
      }

      .brand span {
        font-size: 12px;
        color: var(--muted);
      }

      .icon-row {
        display: flex;
        gap: 8px;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--glass);
        backdrop-filter: blur(24px) saturate(1.45);
        -webkit-backdrop-filter: blur(24px) saturate(1.45);
        color: var(--text);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .stack-stage {
        position: relative;
        width: 100%;
        min-height: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .card-shadow {
        position: absolute;
        width: 100%;
        height: min(100%, 590px);
        border-radius: 24px;
        background: var(--glass);
        backdrop-filter: blur(26px) saturate(1.55);
        -webkit-backdrop-filter: blur(26px) saturate(1.55);
        border: 1px solid var(--line);
      }

      .card-shadow.one {
        transform: translateY(18px) scale(0.96);
        opacity: 0.46;
      }

      .card-shadow.two {
        transform: translateY(34px) scale(0.92);
        opacity: 0.22;
      }

      .action-card {
        position: relative;
        z-index: 2;
        width: 100%;
        min-width: 0;
        height: min(100%, 590px);
        min-height: 540px;
        display: flex;
        flex-direction: column;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: #fbfbf7;
        box-shadow: 0 16px 46px rgba(0, 0, 0, 0.08);
        padding: 20px;
        cursor: pointer;
      }

      .card-meta,
      .detail-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .session {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .provider-icon,
      .provider-fallback {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        flex: 0 0 auto;
      }

      .provider-icon {
        display: block;
        object-fit: cover;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.06);
      }

      .provider-fallback {
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #1c1c1f, #5e6ad2);
        color: white;
        font-size: 11px;
        font-weight: 750;
      }

      .session-text {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .session-text strong {
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 12.5px;
      }

      .session-text span {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: var(--muted);
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--amber);
        flex: 0 0 auto;
      }

      .dot.blocked {
        background: var(--red);
      }

      .dot.running {
        background: var(--green);
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 8px;
        white-space: nowrap;
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 11.5px;
        background: rgba(0, 0, 0, 0.035);
      }

      .terminal-meta {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
        display: grid;
        gap: 6px;
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.38;
      }

      .terminal-meta div {
        display: grid;
        grid-template-columns: 56px 1fr;
        gap: 6px;
      }

      .terminal-meta span {
        color: var(--muted);
      }

      .terminal-meta strong {
        font-weight: 650;
      }

      .terminal-meta .status {
        color: var(--amber);
      }

      .terminal-tail {
        overflow: auto;
        flex: 1;
        min-height: 0;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 11.5px;
        line-height: 1.45;
        color: #222225;
        white-space: pre-wrap;
      }

      .terminal-tail .muted {
        color: #74747a;
      }

      .terminal-tail .accent {
        color: #067078;
        font-weight: 650;
      }

      .terminal-tail .success {
        color: #087a3d;
      }

      .terminal-tail .warning {
        color: #b35600;
      }

      .chips {
        display: flex;
        max-width: 100%;
        min-width: 0;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      .chip {
        min-height: 32px;
        border: 1px solid var(--line);
        border-radius: 11px;
        padding: 0 12px;
        background: rgba(0, 0, 0, 0.035);
        color: var(--text);
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
      }

      .chip:focus-visible,
      input:focus-visible,
      textarea:focus-visible {
        border-color: rgba(10, 132, 255, 0.45);
        box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.12);
      }

      .spacer {
        display: none;
      }

      .reply-dock {
        min-width: 0;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
      }

      .reply-dock .chips {
        margin: 0 0 8px;
        flex-wrap: nowrap;
        overflow-x: auto;
        overscroll-behavior-x: contain;
        padding-bottom: 0;
        scrollbar-width: none;
      }

      .reply-dock .chips::-webkit-scrollbar,
      .detail-reply .chips::-webkit-scrollbar {
        display: none;
      }

      .reply-dock .chip {
        white-space: nowrap;
      }

      .card-composer,
      .composer {
        min-width: 0;
      }

      .queue {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 38px;
        color: var(--muted);
        font-size: 12px;
      }

      .queue span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--line);
      }

      .queue span.active {
        width: 20px;
        border-radius: 8px;
        background: var(--blue);
      }

      .detail {
        position: fixed;
        inset: 0;
        display: none;
        justify-content: center;
        background: rgba(0, 0, 0, 0.2);
        z-index: 10;
      }

      .detail.open {
        display: flex;
      }

      .detail-panel {
        width: 375px;
        height: 812px;
        max-width: 100vw;
        max-height: 100vh;
        background: var(--canvas);
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: 14px;
      }

      .detail-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 48px;
      }

      .back {
        border: 0;
        background: transparent;
        color: var(--blue);
        font-weight: 650;
        cursor: pointer;
      }

      .thread {
        overflow: auto;
        padding: 12px 0 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .message {
        max-width: 86%;
        border-radius: 18px;
        padding: 12px 14px;
        font-size: 15px;
        line-height: 1.42;
        background: var(--surface);
        border: 1px solid var(--line);
      }

      .message.user {
        align-self: flex-end;
        background: var(--blue);
        border-color: var(--blue);
        color: white;
      }

      .message pre {
        margin: 8px 0 0;
        white-space: pre-wrap;
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .detail-reply .chips {
        margin: 0 0 10px;
        flex-wrap: nowrap;
        overflow-x: auto;
        overscroll-behavior-x: contain;
        scrollbar-width: none;
      }

      input,
      textarea {
        width: 100%;
        min-width: 0;
        min-height: 44px;
        max-height: 120px;
        resize: none;
        border: 1px solid rgba(229, 229, 231, 0.72);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.026);
        color: var(--text);
        padding: 12px 46px 12px 14px;
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
        outline: none;
        cursor: text;
      }

      @media (prefers-color-scheme: dark) {
        input,
        textarea {
          background: rgba(255, 255, 255, 0.08);
        }
      }

      .send {
        position: absolute;
        right: 5px;
        bottom: 6px;
        width: 31px;
        height: 31px;
        border: 0;
        border-radius: 9px;
        background: var(--blue);
        color: white;
        font-weight: 800;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        transform: scale(0.86);
        transition: opacity 140ms ease, transform 140ms ease;
      }

      .input-shell {
        position: relative;
        min-width: 0;
      }

      .input-shell.has-text .send {
        opacity: 1;
        pointer-events: auto;
        transform: scale(1);
      }

      @media (min-width: 900px) {
        body {
          background: var(--canvas);
        }

        .shell,
        .detail-panel {
          margin-top: 18px;
          border: 1px solid var(--line);
          border-radius: 32px;
          box-shadow: 0 24px 80px rgba(0, 0, 0, 0.08);
        }
      }

      @media (max-height: 680px) {
        .stack-stage {
          min-height: 530px;
        }

        .action-card,
        .card-shadow {
          height: 500px;
          min-height: 500px;
        }

      }
    </style>
  </head>
  <body>
    <main class="shell" aria-label="Steer action queue prototype">
      <header class="topbar">
        <div class="brand">
          <strong>Steer</strong>
          <span id="queue-count">3 waiting actions</span>
        </div>
        <div class="icon-row">
          <button class="icon-btn" type="button" aria-label="Previous card" id="prev">‹</button>
          <button class="icon-btn" type="button" aria-label="Next card" id="next">›</button>
        </div>
      </header>

      <section class="stack-stage">
        <div class="card-shadow two"></div>
        <div class="card-shadow one"></div>
        <article class="action-card" id="card">
          <div class="card-meta">
            <div class="session">
              <span id="provider-mark"></span>
              <div class="session-text">
                <strong id="project-name">brief-app</strong>
                <span><span class="dot" id="status-dot"></span><span id="provider-name">Claude Code</span></span>
              </div>
            </div>
            <span class="pill" id="wait-age">waiting 12m</span>
          </div>
          <div class="terminal-meta" aria-label="Card metadata">
            <div><span>title:</span><strong id="card-title">Supabase RLS decision needed</strong></div>
            <div><span>status:</span><strong class="status" id="card-status">waiting_for_decision</strong></div>
            <div><span>reason:</span><span id="card-summary">Claude is waiting for the RLS scope before applying migrations.</span></div>
          </div>
          <div class="terminal-tail" id="terminal-tail" aria-label="Terminal tail"></div>
          <div class="spacer"></div>
          <div class="reply-dock" aria-label="Quick reply">
            <div class="chips" id="chips"></div>
            <div class="card-composer">
              <div class="input-shell" id="card-input-shell">
                <input id="card-reply" type="text" aria-label="Quick reply" placeholder="Reply to this AI session" />
                <button class="send" type="button" id="card-send" aria-label="Send reply">↑</button>
              </div>
            </div>
          </div>
        </article>
      </section>

      <footer class="queue" id="queue-dots" aria-label="Queue position"></footer>
    </main>

    <section class="detail" id="detail" aria-label="Session detail">
      <div class="detail-panel">
        <header class="detail-header">
          <button class="back" type="button" id="close-detail">Back</button>
          <div class="detail-meta">
            <span id="detail-session">brief-app · claude</span>
            <span class="pill" id="detail-status">waiting</span>
          </div>
        </header>
        <div class="thread" id="thread"></div>
        <footer class="detail-reply">
          <div class="chips" id="detail-chips"></div>
          <div class="composer">
            <div class="input-shell" id="detail-input-shell">
              <textarea id="reply" aria-label="Reply" placeholder="Send instruction to this session"></textarea>
              <button class="send" type="button" id="send" aria-label="Send instruction">↑</button>
            </div>
          </div>
        </footer>
      </div>
    </section>

    <script>
      const cards = [
        {
          session: "brief-app · claude",
          project: "brief-app",
          provider: "Claude Code",
          providerIcon: "assets/claude.png",
          state: "waiting",
          statusClass: "",
          age: "waiting 12m",
          title: "Supabase RLS decision needed",
          summary:
            "Claude is waiting for the RLS scope before applying migrations.",
          terminal: [
            ["success", "• Schema pass complete. One policy decision is blocking migration."],
            ["", ""],
            ["accent", "Decision needed:"],
            ["", "- Option A: user-level RLS"],
            ["muted", "  simpler first dogfood build, fewer membership joins"],
            ["", "- Option B: workspace-level RLS"],
            ["muted", "  better future collaboration, more schema surface now"],
            ["", ""],
            ["accent", "Next:"],
            ["warning", "Choose one so I can generate policies and run migrations."]
          ],
          chips: ["Use user-level", "Use workspace-level", "Explain tradeoffs"],
          thread: [
            ["agent", "I finished the table sketch and found one decision before writing policies."],
            ["agent", "Option A: user-level RLS. It is faster and safer for single-player dogfooding.\n\nOption B: workspace-level RLS. It fits collaboration later but adds membership joins now."],
            ["user", "Keep v1 scoped. Which option reduces launch risk?"],
            ["agent", "User-level RLS reduces launch risk. I need approval before applying migrations."]
          ]
        },
        {
          session: "steer-docs · codex",
          project: "steer-docs",
          provider: "Codex CLI",
          providerIcon: "assets/codex-color.png",
          state: "blocked",
          statusClass: "blocked",
          age: "blocked 4m",
          title: "Mac app window model is unresolved",
          summary:
            "Codex needs the default Mac window rule before locking SwiftUI constraints.",
          terminal: [
            ["warning", "• Found conflicting layout assumptions in DESIGN.md and SwiftUI shell."],
            ["", ""],
            ["accent", "Blocked on:"],
            ["", "- default fixed utility window"],
            ["", "- resizable desktop-first app shell"],
            ["", ""],
            ["accent", "Recommended:"],
            ["success", "Use 375 x 812 for v1 preview."],
            ["muted", "Allow side rail only after the base iOS-portable stack works."]
          ],
          chips: ["Use 375 x 812", "Allow resize", "Add side rail later"],
          thread: [
            ["agent", "I recommend a focused utility window: 375px wide by 812px tall by default, with a later resizable desktop split view."],
            ["agent", "This keeps the primary card stack portable to iOS while preserving Mac keyboard and menu bar affordances."]
          ]
        },
        {
          session: "happy-research · gemini",
          project: "happy-research",
          provider: "Gemini CLI",
          providerIcon: "",
          state: "running",
          statusClass: "running",
          age: "running",
          title: "Happy adapter notes are ready",
          summary:
            "Gemini can turn the Happy research into the first adapter spike.",
          terminal: [
            ["success", "• Happy wrapper research summarized."],
            ["", ""],
            ["accent", "Learned:"],
            ["", "- Claude path: Agent SDK / hooks / session scanner"],
            ["", "- Codex path: codex app-server JSON-RPC"],
            ["muted", "- raw pty should be fallback, not ideology"],
            ["", ""],
            ["accent", "Next:"],
            ["success", "Pick one provider adapter and prove bidirectional delivery."]
          ],
          chips: ["Start Codex adapter", "Start Claude adapter", "Write spike tasks"],
          thread: [
            ["agent", "Happy is not a raw pty wrapper anymore. Claude and Codex use provider-native control paths where available."],
            ["agent", "Recommended next step: pick one provider adapter and prove bidirectional instruction delivery."]
          ]
        }
      ];

      let index = 0;
      const byId = (id) => document.getElementById(id);

      function render() {
        const item = cards[index];
        byId("queue-count").textContent = `${cards.length} waiting actions`;
        byId("project-name").textContent = item.project;
        byId("provider-name").textContent = item.provider;
        byId("provider-mark").innerHTML = item.providerIcon
          ? `<img class="provider-icon" src="${item.providerIcon}" alt="${item.provider}" />`
          : `<span class="provider-fallback" aria-label="${item.provider}">${item.provider.slice(0, 1)}</span>`;
        byId("status-dot").className = `dot ${item.statusClass}`;
        byId("wait-age").textContent = item.age;
        byId("card-title").textContent = item.title;
        byId("card-status").textContent =
          item.state === "waiting" ? "waiting_for_decision" : item.state;
        byId("card-summary").textContent = item.summary;
        byId("terminal-tail").innerHTML = item.terminal
          .map(([kind, text]) => {
            const safe = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            return `<div class="${kind}">${safe || "&nbsp;"}</div>`;
          })
          .join("");
        byId("chips").innerHTML = item.chips
          .map((chip) => `<button class="chip" type="button">${chip}</button>`)
          .join("");
        byId("queue-dots").innerHTML = cards
          .map((_, dotIndex) => `<span class="${dotIndex === index ? "active" : ""}"></span>`)
          .join("");
        renderDetail();
      }

      function renderDetail() {
        const item = cards[index];
        byId("detail-session").textContent = item.session;
        byId("detail-status").textContent = item.state;
        byId("detail-chips").innerHTML = item.chips
          .map((chip) => `<button class="chip" type="button">${chip}</button>`)
          .join("");
        byId("thread").innerHTML = item.thread
          .map(([who, text]) => {
            const safe = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            return `<div class="message ${who === "user" ? "user" : ""}">${safe.replace(/\n/g, "<br>")}</div>`;
          })
          .join("");
      }

      function move(delta) {
        index = (index + delta + cards.length) % cards.length;
        render();
      }

      function syncSendState(input, shell) {
        shell.classList.toggle("has-text", Boolean(input.value.trim()));
      }

      const cardReply = byId("card-reply");
      const detailReply = byId("reply");
      const cardInputShell = byId("card-input-shell");
      const detailInputShell = byId("detail-input-shell");

      byId("next").addEventListener("click", () => move(1));
      byId("prev").addEventListener("click", () => move(-1));
      byId("card").addEventListener("click", (event) => {
        if (event.target.closest(".reply-dock, button, input")) return;
        byId("detail").classList.add("open");
      });
      byId("close-detail").addEventListener("click", () => byId("detail").classList.remove("open"));
      byId("chips").addEventListener("click", (event) => {
        if (event.target.matches(".chip")) {
          cardReply.value = event.target.textContent;
          syncSendState(cardReply, cardInputShell);
          cardReply.focus();
        }
      });
      byId("detail-chips").addEventListener("click", (event) => {
        if (event.target.matches(".chip")) {
          detailReply.value = event.target.textContent;
          syncSendState(detailReply, detailInputShell);
          detailReply.focus();
        }
      });
      cardReply.addEventListener("input", () => syncSendState(cardReply, cardInputShell));
      detailReply.addEventListener("input", () => syncSendState(detailReply, detailInputShell));
      byId("card-send").addEventListener("click", () => {
        if (!cardReply.value.trim()) return;
        cards[index].thread.push(["user", cardReply.value.trim()]);
        cardReply.value = "";
        syncSendState(cardReply, cardInputShell);
        move(1);
      });
      byId("send").addEventListener("click", () => {
        if (!detailReply.value.trim()) return;
        cards[index].thread.push(["user", detailReply.value.trim()]);
        detailReply.value = "";
        syncSendState(detailReply, detailInputShell);
        renderDetail();
        byId("thread").scrollTop = byId("thread").scrollHeight;
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowRight") move(1);
        if (event.key === "ArrowLeft") move(-1);
        if (event.key === "Enter" && !byId("detail").classList.contains("open")) {
          byId("detail").classList.add("open");
        }
        if (event.key === "Escape") byId("detail").classList.remove("open");
      });

      render();
    </script>
  </body>
</html>
