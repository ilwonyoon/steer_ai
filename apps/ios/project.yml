name: Steer
options:
  bundleIdPrefix: ai.steer
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    DEVELOPMENT_TEAM: LG7667PAS6
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.0.1

packages:
  SteerCore:
    path: ../../packages/SteerCore

targets:
  Steer:
    type: application
    platform: iOS
    sources:
      - path: SteerIOS
    dependencies:
      - package: SteerCore
    info:
      path: SteerIOS/Info.plist
      properties:
        CFBundleDisplayName: Steer
        CFBundleIdentifier: ai.steer.ios
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Allow http://127.0.0.1 during local wrangler dev. Drop before
        # App Store submission once the relay is on https.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.steer.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: SteerIOS/Steer.entitlements
    entitlements:
      path: SteerIOS/Steer.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default

  SteerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SteerIOSTests
    dependencies:
      - target: Steer
      - package: SteerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.steer.ios.tests
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Steer.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Steer

  # XCUITest target. Driven from CLI via:
  #   xcodebuild test -scheme Steer \
  #     -destination 'platform=iOS Simulator,name=iPhone 16' \
  #     -only-testing:SteerUITests
  #
  # The app reads the `--uitest` launch argument and forces fixture
  # mode (no Apple sign-in, seeded cards) so the system Apple ID
  # dialog never appears — that dialog isn't automatable by XCUITest
  # since it's owned by another process.
  SteerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SteerIOSUITests
    dependencies:
      - target: Steer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.steer.ios.uitests
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Steer
