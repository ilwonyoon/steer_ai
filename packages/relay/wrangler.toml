name = "steer-relay"
main = "src/index.ts"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]

# D1 binding — created via Cloudflare dashboard 2026-05-09.
[[d1_databases]]
binding = "DB"
database_name = "steer-relay"
database_id = "3938bcbd-229e-498e-9e33-5e6ff19a3460"

# Durable Objects power per-user WebSocket fanout. Each authenticated
# user gets their own DO instance; cards published from Mac broadcast
# to every connected client of that user (iPhone / Web / additional
# Macs in the future).
[[durable_objects.bindings]]
name = "USER_HUB"
class_name = "UserHub"

[[migrations]]
tag = "v1"
# Free plan requires SQLite-backed Durable Objects (the older
# `new_classes` style is paid-only). Per Cloudflare error 10097.
new_sqlite_classes = ["UserHub"]

# Apple's identity-token JWKS endpoint — the worker fetches Apple
# public keys here to verify Sign in with Apple identity tokens.
[vars]
APPLE_JWKS_URL = "https://appleid.apple.com/auth/keys"
APPLE_AUDIENCES = "ai.steer.mac,ai.steer.ios"
APPLE_ISSUER = "https://appleid.apple.com"
# APNS routing.
# Debug-signed iOS builds (xcodebuild Debug → aps-environment =
# development) get sandbox device tokens. Production APNS endpoint
# silently drops those, which manifests as "no banner on the
# iPhone" while every other signal looks fine. Flip this to "0" (or
# remove the var) when shipping a TestFlight / App Store build,
# which gets aps-environment = production and a production token.
APNS_USE_SANDBOX = "1"

# Used by /v1/auth/apple to mint our own session JWT after the Apple
# identity token validates. Set via:
#   wrangler secret put SESSION_JWT_SECRET
# Generate locally with `openssl rand -base64 64`.
# (The secret name lives only in Cloudflare; never check the value in.)
