# Release workflow for Steer.
#
# Triggered by pushing a version tag (e.g. v0.1.0). Builds the SwiftPM
# bundle through scripts/release-mac.sh, signs with the imported
# Developer ID Application certificate, notarizes with notarytool, and
# uploads the resulting .dmg to a GitHub Release.
#
# Required repository secrets:
#   DEVELOPER_ID_CERT_P12        — base64-encoded Developer ID Application .p12
#   DEVELOPER_ID_CERT_PASSWORD   — password for the .p12
#   NOTARY_APPLE_ID              — Apple ID used for notarization
#   NOTARY_TEAM_ID               — Apple Team ID (LG7667PAS6)
#   NOTARY_APP_SPECIFIC_PASSWORD — app-specific password for the Apple ID
#   PROVISIONING_PROFILE  — base64-encoded .provisionprofile that grants
#                                  com.apple.developer.applesignin to ai.steer.mac.
#                                  Required because Steer.entitlements requests
#                                  Sign in with Apple, which build-mac-app.sh
#                                  refuses to bundle without an embedded profile.
#
# Required permissions:
#   contents: write   — create GitHub Releases

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (defaults to current ref)"
        required: false

jobs:
  release:
    name: Build, sign, notarize, publish
    # macos-26 is required for the Liquid Glass APIs (glassEffect, etc.) that
    # GlassSurface.swift uses. macos-15 ships Xcode 16.4 + macOS 15 SDK and
    # fails to compile the Mac app.
    runs-on: macos-26
    timeout-minutes: 30

    permissions:
      contents: write

    env:
      KEYCHAIN_PATH: ${{ github.workspace }}/../steer-release-${{ github.run_id }}.keychain
      KEYCHAIN_PASSWORD: steer-ci-${{ github.run_id }}
      OUTPUT_ROOT: .build/release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # workflow_dispatch defaults to the default-branch ref. Honour
          # inputs.tag explicitly so a manual rerun builds exactly the commit
          # the tag points at, not whatever main has drifted to.
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
            # Checkout pinned this ref above; if it isn't a real tag on
            # origin the resolve fails fast instead of bundling the wrong
            # commit. action-gh-release would otherwise happily create the
            # tag against the default branch.
            if ! git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
              echo "error: tag '$tag' does not exist on origin after checkout" >&2
              echo "  push the tag first:" >&2
              echo "    git tag $tag && git push origin $tag" >&2
              exit 1
            fi
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            echo "error: workflow_dispatch was triggered without inputs.tag and the ref is not a tag" >&2
            exit 1
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "error: tag '$tag' must match vMAJOR.MINOR.PATCH (e.g. v0.1.0)" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Install Node 22.5+
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install workspace dependencies
        # package-lock.json is gitignored; use install rather than ci.
        run: npm install

      - name: Run node tests
        run: npm test

      - name: Pre-flight Mac swift build
        run: swift build --package-path apps/mac

      - name: Import Developer ID certificate into a temporary keychain
        env:
          DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -e
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make this keychain the search default so `security find-identity`
          # picks it up during release-mac.sh. The existing keychain list is
          # intentionally word-split so each path becomes its own argument.
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "$DEVELOPER_ID_CERT_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/cert.p12

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Register notarytool credentials
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_APP_SPECIFIC_PASSWORD: ${{ secrets.NOTARY_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials steer-notary \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_APP_SPECIFIC_PASSWORD" \
            --keychain "$KEYCHAIN_PATH"

      - name: Generate placeholder icon if needed
        run: |
          if [ ! -f apps/mac/Resources/AppIcon-master.png ]; then
            bash scripts/generate-placeholder-icon.sh
          fi
          bash scripts/generate-app-icon.sh

      - name: Decode provisioning profile
        id: profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          set -e
          if [ -z "$PROVISIONING_PROFILE" ]; then
            echo "error: PROVISIONING_PROFILE secret is not set" >&2
            echo "  Steer.entitlements requires com.apple.developer.applesignin," >&2
            echo "  which can only be embedded via a provisioning profile." >&2
            echo "  Export the .provisionprofile, base64 it, and register the secret." >&2
            exit 1
          fi
          PROFILE_PATH="${{ github.workspace }}/../steer.provisionprofile"
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"
          if [ ! -s "$PROFILE_PATH" ]; then
            echo "error: decoded provisioning profile is empty" >&2
            exit 1
          fi
          echo "path=$PROFILE_PATH" >> "$GITHUB_OUTPUT"

      - name: Run release-mac.sh
        env:
          STEER_NOTARY_PROFILE: steer-notary
          APP_VERSION: ${{ steps.tag.outputs.version }}
          PROVISIONING_PROFILE: ${{ steps.profile.outputs.path }}
        run: bash scripts/release-mac.sh

      - name: Compute checksum
        id: artifact
        run: |
          DMG_PATH="$(find .build/release -maxdepth 1 -name 'Steer-*.dmg' -print -quit)"
          if [ -z "$DMG_PATH" ]; then
            echo "error: no DMG produced under .build/release" >&2
            exit 1
          fi
          shasum -a 256 "$DMG_PATH" > "${DMG_PATH}.sha256"
          echo "dmg=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Steer ${{ steps.tag.outputs.version }}
          files: |
            ${{ steps.artifact.outputs.dmg }}
            ${{ steps.artifact.outputs.dmg }}.sha256

      - name: Tear down temporary keychain and profile
        if: always()
        env:
          PROFILE_PATH: ${{ steps.profile.outputs.path }}
        run: |
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          if [ -n "$PROFILE_PATH" ] && [ -f "$PROFILE_PATH" ]; then
            rm -f "$PROFILE_PATH" || true
          fi
