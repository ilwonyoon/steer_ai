# Run the full Steer test pipeline on every push and pull request.
# Unit + contract + visibility-gate + classifier tests run as `npm test`;
# the heavier wrapper / agent integration suite runs as
# `npm run test:integration` and uses real PTYs and Unix sockets.

name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  node:
    name: Node tests (unit + integration)
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Node 22.5+
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install workspace dependencies
        # package-lock.json is gitignored (we treat the npm workspace as
        # a private dev surface, not a published package). Use install
        # rather than ci so the runner doesn't bail.
        run: npm install

      - name: Unit + contract tests
        run: npm test

      - name: Wrapper / agent integration tests
        # Integration suite drives real node-pty + Unix sockets. The
        # GitHub-hosted macOS runner sometimes can't allocate a TTY
        # within the 5s session-register timeout used by the harness,
        # which makes this suite flaky in CI even though it passes
        # locally. Treat the run as advisory (continue-on-error) until
        # we either virtualize the PTY layer or move the integration
        # suite to a self-hosted Mac.
        continue-on-error: true
        run: npm run test:integration

  swift:
    name: Swift build
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build SteerMac
        run: swift build --package-path apps/mac
